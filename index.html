<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeakEasy VN</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="stats">XP: <span id="xp-count">0</span></div>
            <h2 id="title">SpeakEasy VN</h2>
        </header>

        <div id="menu-screen" class="screen active">
            <div class="hero">
                <h3>Sẵn sàng luyện tập?</h3>
                <p>Chọn trình độ để bắt đầu</p>
            </div>
            <button class="btn btn-main" onclick="startLevel('A1')">Trình độ A1 (Cơ bản)</button>
            <button class="btn btn-main" onclick="startLevel('B1')">Trình độ B1 (Giao tiếp)</button>
            <button class="btn btn-outline" onclick="resetXP()">Xóa tiến trình</button>
        </div>

        <div id="practice-screen" class="screen">
            <div id="question-container"></div>
            <div id="feedback"></div>
            <button id="next-btn" class="btn btn-success" style="display:none" onclick="nextQuestion()">Tiếp theo</button>
            <button class="btn-text" onclick="showMenu()">← Quay lại Menu</button>
        </div>
    </div>

    <script src="data/a1-data.js"></script>
    <script src="data/b1-data.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
